name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  DOCKER_IMAGE: pamabel/springg-maven

jobs:

  # -------------------------
  # TEST
  # -------------------------
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven   # ✅ Cache Maven

      - run: mvn test

  # -------------------------
  # BUILD + PUSH
  # -------------------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:latest

  # -------------------------
  # SCAN SECURITE
  # -------------------------
  scan:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest

  # -------------------------
  # DEPLOY + ROLLBACK
  # -------------------------
  deploy:
    runs-on: self-hosted
    needs: scan

    steps:
      - name: Deploy with rollback
        run: |
          echo "📦 Pull nouvelle image"
          docker pull ${{ env.DOCKER_IMAGE }}:latest

          echo "💾 Backup ancienne image"
          docker tag ${{ env.DOCKER_IMAGE }}:latest ${{ env.DOCKER_IMAGE }}:previous || true

          echo "🛑 Stop ancien conteneur"
          docker stop spring-app || true
          docker rm spring-app || true

          echo "🚀 Lancement nouveau conteneur"
          docker run -d -p 8080:8080 --name spring-app ${{ env.DOCKER_IMAGE }}:latest

          echo "⏳ Attente du démarrage de l'application..."

          for i in {1..10}; do
            if curl -f http://localhost:8080; then
              echo "✅ Application prête"
              exit 0
            fi
            echo "⏳ Tentative $i..."
            sleep 5
          done

          echo "❌ Deploy échoué → rollback"
          docker stop spring-app
          docker rm spring-app
          docker run -d -p 8080:8080 --name spring-app ${{ env.DOCKER_IMAGE }}:previous
          exit 1

  # -------------------------
  # NOTIFICATION
  # -------------------------
  notify:
    runs-on: ubuntu-latest
    needs: [test, build-and-push, scan, deploy]
    if: failure()

    steps:
      - name: Notification échec
        run: echo "❌ Le pipeline CI/CD a échoué"