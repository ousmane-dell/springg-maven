name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  DOCKER_IMAGE: pamabel/springg-maven

jobs:

  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - run: mvn test

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Debug
        run: echo "USER=${{ secrets.DOCKERHUB_USERNAME }}"

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:latest

  deploy:
    runs-on: self-hosted   # ← pour utiliser Docker sur ton runner local
    needs: build-and-push

    steps:
      - name: Deploy locally
        run: |
          docker pull ${{ env.DOCKER_IMAGE }}:latest
          docker stop spring-app || true
          docker rm spring-app || true
          docker run -d -p 8080:8080 --name spring-app ${{ env.DOCKER_IMAGE }}:latest
      